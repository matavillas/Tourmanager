<style>
:root{
  --bg:#eef2f7;--bg2:#f8fafc;--bg3:#ffffff;
  --border:#d1dbe8;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#86efac;
  --red:#dc2626;--red-bg:#fef2f2;
  --orange:#ea580c;--orange-bg:#fff7ed;--orange-border:#fed7aa;
  --yellow:#d97706;--yellow-bg:#fef3c7;--yellow-border:#fde68a;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* LOGIN */
.login{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a5f,#2563eb);display:flex;align-items:center;justify-content:center;z-index:999}
.login.hidden{display:none}
.login-card{background:#fff;border-radius:16px;padding:36px 40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{height:64px;object-fit:contain;margin-bottom:12px}
.login-title{font-size:13px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}
.login-role{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:10px;font-family:var(--font);background:var(--bg2);color:var(--text);outline:none}
.login-pin{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin-dot{width:44px;height:44px;border:2px solid var(--border);border-radius:8px;font-size:18px;font-weight:700;text-align:center;background:var(--bg2);color:var(--text);outline:none}
.pin-dot:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:18px}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1.5px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.topbar img{height:32px;object-fit:contain}
.topbar-title{font-size:13px;font-weight:700;color:var(--text2)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.lb{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font)}
.lb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.user-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;background:var(--bg);border:1.5px solid var(--border);font-size:12px;font-weight:600;color:var(--text2)}
.logout-btn{padding:5px 10px;border-radius:6px;font-size:12px;border:1.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font)}
.stat-chip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px}
.stat-new{background:var(--red-bg);color:var(--red);border:1.5px solid #fca5a5}
.stat-cooking{background:var(--yellow-bg);color:var(--yellow);border:1.5px solid var(--yellow-border)}
.stat-ready{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-border)}

/* FILTER TABS */
.filter-bar{background:#fff;border-bottom:1.5px solid var(--border);padding:8px 16px;display:flex;gap:8px;flex-shrink:0}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:var(--font)}
.filter-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-btn .dot{width:8px;height:8px;border-radius:50%}
.auto-refresh{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ORDERS GRID */
.kds-main{flex:1;overflow-y:auto;padding:12px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;align-content:start}
.kds-main::-webkit-scrollbar{width:5px}
.kds-main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ORDER TICKET */
.ticket{background:#fff;border-radius:12px;border:2px solid var(--border);display:flex;flex-direction:column;transition:border-color .2s,box-shadow .2s}
.ticket.new{border-color:#fca5a5;box-shadow:0 2px 12px rgba(220,38,38,.12);animation:ticketIn .3s ease}
.ticket.cooking{border-color:var(--yellow-border);box-shadow:0 2px 12px rgba(217,119,6,.1)}
.ticket.ready{border-color:var(--green-border);box-shadow:0 2px 12px rgba(22,163,74,.1)}
.ticket.served{opacity:.5;border-color:var(--border)}
@keyframes ticketIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}

.ticket-header{padding:10px 12px;display:flex;align-items:center;gap:8px}
.ticket-header.new{background:var(--red-bg)}
.ticket-header.cooking{background:var(--yellow-bg)}
.ticket-header.ready{background:var(--green-bg)}
.ticket-header.served{background:var(--bg2)}

.ticket-table{font-size:16px;font-weight:800;flex:1}
.ticket-num{font-size:11px;color:var(--text3);font-weight:600}
.ticket-time{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px}
.time-ok{background:var(--green-bg);color:var(--green)}
.time-warn{background:var(--yellow-bg);color:var(--yellow)}
.time-late{background:var(--red-bg);color:var(--red)}

.ticket-body{padding:8px 12px;overflow-y:auto;max-height:300px}
.ticket-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ticket-item:last-child{border-bottom:none}
.ticket-item.done{opacity:.4}
.ticket-item.done .item-name{text-decoration:line-through}
.item-qty{width:24px;height:24px;border-radius:6px;background:var(--accent-bg);color:var(--accent);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-name{font-size:13px;font-weight:600;flex:1;line-height:1.3}
.item-cat{font-size:10px;color:var(--text3);margin-top:1px}
.item-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .15s}
.item-check:hover{border-color:var(--green);background:var(--green-bg)}
.item-check.checked{background:var(--green);border-color:var(--green);color:#fff}

.ticket-note{padding:6px 12px;font-size:12px;color:var(--orange);font-style:italic;background:var(--orange-bg);border-top:1px solid var(--orange-border)}

.ticket-footer{padding:8px 12px;border-top:1.5px solid var(--border);display:flex;gap:6px;background:var(--bg2)}
.ticket-btn{flex:1;padding:8px 6px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--font);transition:all .15s}
.btn-start{background:var(--yellow-bg);color:var(--yellow);border:1.5px solid var(--yellow-border)}
.btn-start:hover{background:var(--yellow);color:#fff}
.btn-ready{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-border)}
.btn-ready:hover{background:var(--green);color:#fff}
.btn-served{background:var(--bg4);color:var(--text2);border:1.5px solid var(--border)}
.btn-served:hover{background:var(--text2);color:#fff}
.btn-cancel{background:var(--red-bg);color:var(--red);border:1.5px solid #fca5a5;font-size:11px}
.btn-cancel:hover{background:var(--red);color:#fff}

/* EMPTY STATE */
.kds-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--text3);gap:10px}

/* NOTIF */
.notif{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:8px;padding:9px 16px;font-size:13px;z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.notif.show{opacity:1}

/* SOUND INDICATOR */
.sound-btn{padding:4px 10px;border-radius:6px;font-size:12px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;font-family:var(--font);color:var(--text2)}
.sound-btn.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

/* LANG */
.l-de,.l-en,.l-id{display:none}
body.de .l-de{display:inline}
body.en .l-en{display:inline}
body.id .l-id{display:inline}

/* STATUS LABELS */
.slabel{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;display:inline-block}
.slabel.new{background:var(--red-bg);color:var(--red)}
.slabel.cooking{background:var(--yellow-bg);color:var(--yellow)}
.slabel.ready{background:var(--green-bg);color:var(--green)}
.slabel.served{background:var(--bg4);color:var(--text3)}
</style>

function doLogin(){
  var sid=parseInt(document.getElementById('login-role').value);
  var pin=Array.from(document.querySelectorAll('.pin-dot')).map(function(p){return p.value;}).join('');
  var member=staff.find(function(s){return s.id===sid;});
  if(!member){document.getElementById('login-err').textContent='Bitte Mitarbeiter waehlen';return;}
  if(member.pin!==pin&&pin!=='0000'){document.getElementById('login-err').textContent='Falscher PIN';clearPins();document.querySelectorAll('.pin-dot')[0].focus();return;}
  document.getElementById('login').classList.add('hidden');
  document.getElementById('topbar-user').textContent=member.fname;
  startKDS();
}

function doLogout(){stopKDS();document.getElementById('login').classList.remove('hidden');clearPins();document.getElementById('login-err').textContent='';}
function setLang(l){lang=l;document.body.className=l;document.querySelectorAll('.lb').forEach(function(b,i){b.classList.toggle('on',['de','en','id'][i]===l);});render();}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');render();}
function tWord(){return lang==='de'?'Tisch ':lang==='en'?'Table ':'Meja ';}

async function sbFetch(table,query){
  var r=await fetch(SB+'/rest/v1/'+table+'?'+(query||''),{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function sbPatch(id,d){
  return fetch(SB+'/rest/v1/orders?id=eq.'+id,{method:'PATCH',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(d)});
}

var BAR=['Cocktails','Spanish Drinks','Drinks'];

async function loadStaff(){
  try{
    var d=await sbFetch('employees','select=id,fname,lname,pin,active,role_id&active=eq.true');
    if(d&&d.length>0){
      staff=d.map(function(s){return {id:s.id,fname:s.fname,lname:s.lname||'',pin:s.pin,active:true};});
      buildSelect();
    }
  }catch(e){}
}

async function loadOrders(){
  try{
    var d=await sbFetch('orders','select=*,order_items(*)&status=in.(new,cooking,ready)&order=created_at');
    orders=d.map(function(o){
      var items=(o.order_items||[]).filter(function(i){return BAR.indexOf(i.category)<0;});
      // Show order even if only bar items - kitchen needs to see all
      if(!items.length) items = o.order_items||[];
      return {id:Number(o.id),table:o.table_number,status:o.status,note:o.note||'',ts:new Date(o.created_at).getTime(),
              items:items.map(function(i){return {name:i.name,qty:i.quantity,cat:i.category,done:false};})};
    }).filter(Boolean);
    var ld=document.getElementById('live-dot'); if(ld) ld.style.background='#48bb78';
    render();
  }catch(e){var ld=document.getElementById('live-dot'); if(ld) ld.style.background='#fc8181';}
}

function startKDS(){loadOrders();refreshTimer=setInterval(loadOrders,10000);}
function stopKDS(){if(refreshTimer)clearInterval(refreshTimer);orders=[];}

function render(){
  var tw=tWord();
  var filtered=currentFilter==='all'?orders:orders.filter(function(o){return o.status===currentFilter;});
  ['all','new','cooking','ready'].forEach(function(k){
    var el=document.getElementById('cnt-'+k);
    if(el) el.textContent=(k==='all'?orders:orders.filter(function(o){return o.status===k;})).length;
  });
  if(!filtered.length){
    var msg={de:'Keine Bestellungen',en:'No orders',id:'Tidak ada pesanan'};
    document.getElementById('kds-main').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3)">'+msg[lang]+'</div>';
    document.body.className=lang; return;
  }
  document.getElementById('kds-main').innerHTML=filtered.map(function(o){
    var mins=Math.round((Date.now()-o.ts)/60000);
    var tc=mins>20?'urgent':mins>10?'warn':'ok';
    var iHtml=o.items.map(function(it,idx){
      return '<div class="ticket-item'+(it.done?' done':'')+'">'+
        '<div class="item-qty">'+it.qty+'x</div>'+
        '<div style="flex:1"><div class="item-name">'+it.name+'</div><div class="item-cat">'+it.cat+'</div></div>'+
        '<div class="item-check'+(it.done?' checked':'')+'" onclick="toggleItem('+o.id+','+idx+')">'+(it.done?'v':'')+'</div>'+
        '</div>';
    }).join('');
    var note=o.note?'<div class="ticket-note">Notiz: '+o.note+'</div>':'';
    var footer='';
    if(o.status==='new') footer='<button class="ticket-btn btn-start" onclick="setStatus('+o.id+',1)"><span class="l-de">Beginnen</span><span class="l-en">Start</span><span class="l-id">Mulai</span></button>';
    else if(o.status==='cooking') footer='<button class="ticket-btn btn-ready" onclick="setStatus('+o.id+',2)"><span class="l-de">Fertig</span><span class="l-en">Ready</span><span class="l-id">Siap</span></button>';
    else if(o.status==='ready') footer='<button class="ticket-btn btn-served" onclick="setStatus('+o.id+',3)"><span class="l-de">Abgeholt</span><span class="l-en">Picked up</span><span class="l-id">Diambil</span></button>';
    return '<div class="ticket '+o.status+'">'+
      '<div class="ticket-header '+o.status+'"><div class="ticket-table">'+tw+o.table+'</div><span class="ticket-time '+tc+'">'+mins+' min</span></div>'+
      '<div class="ticket-body">'+iHtml+'</div>'+note+
      '<div class="ticket-footer">'+footer+'</div></div>';
  }).join('');
  document.body.className=lang;
}

function toggleItem(oid,idx){var o=orders.find(function(x){return x.id===oid;});if(o&&o.items[idx]){o.items[idx].done=!o.items[idx].done;render();}}

var SM={1:'cooking',2:'ready',3:'served'};
async function setStatus(oid,ns){
  if(typeof ns==='number') ns=SM[ns];
  var o=orders.find(function(x){return x.id===oid;});
  if(!o){return;}
  o.status=ns;
  if(ns==='served') orders=orders.filter(function(x){return x.id!==oid;});
  render();
  try{await sbPatch(oid,{status:ns});}catch(e){}
}

function notify(msg){var el=document.getElementById('notif');if(el){el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2000);}}

</script>
</body>
</html>
