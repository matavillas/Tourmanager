<html lang="de">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

  <meta http-equiv="Expires" content="0">

<title>Küchen-Display — Mata Villas</title>
<style>
:root{
  --bg:#f0f4f8;--bg2:#fff;--border:#e2e8f0;
  --text:#1a202c;--text2:#4a5568;--text3:#a0aec0;
  --accent:#3182ce;--accent-bg:#ebf8ff;
  --green:#276749;--green-bg:#f0fff4;--green-bd:#9ae6b4;
  --orange:#c05621;--orange-bg:#fffaf0;--orange-bd:#fbd38d;
  --red:#c53030;--red-bg:#fff5f5;--red-bd:#fed7d7;
  --yellow:#b7791f;--yellow-bg:#fffff0;--yellow-bd:#fefcbf;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.login{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100}
.login.hidden{display:none}
.lcard{background:#fff;border-radius:16px;padding:32px 28px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.lcard img{height:56px;object-fit:contain;margin-bottom:16px}
.lcard h2{font-size:17px;font-weight:700;margin-bottom:20px}
.lcard select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:16px;font-family:var(--font);background:#fff;outline:none}
.pins{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin{width:48px;height:52px;border:2px solid var(--border);border-radius:10px;font-size:22px;text-align:center;font-family:var(--font);background:#fff;outline:none}
.pin:focus{border-color:var(--accent)}
.lbtn{width:100%;padding:12px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.lerr{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar img{height:32px;object-fit:contain}
.topbar-title{font-size:15px;font-weight:700}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.lb{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--font)}
.lb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.topbar-user{font-size:13px;color:var(--text2)}
.logout-btn{padding:6px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;font-family:var(--font)}
.l-de,.l-en,.l-id{display:none}
body.de .l-de,body.en .l-en,body.id .l-id{display:inline}
.notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a202c;color:#fff;border-radius:8px;padding:10px 20px;font-size:13px;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.notif.show{opacity:1}
.fbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:8px;flex-shrink:0}
.fbtn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--text2)}
.fbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.fbadge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;margin-left:4px;background:var(--text3);color:#fff}
.fbtn.on .fbadge{background:rgba(255,255,255,.3)}
.live{width:8px;height:8px;border-radius:50%;background:#48bb78;animation:pulse 2s infinite;flex-shrink:0}
.live.off{background:#fc8181}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{flex:1;overflow-y:auto;padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;align-content:start}
.ticket{background:#fff;border-radius:12px;border:2px solid var(--border);display:flex;flex-direction:column}
.ticket.new{border-color:var(--red-bd)}
.ticket.cooking{border-color:var(--orange-bd)}
.ticket.served{border-color:var(--green-bd)}
.thead{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);border-radius:10px 10px 0 0}
.thead.new{background:var(--red-bg)}
.thead.cooking{background:var(--orange-bg)}
.thead.served{background:var(--green-bg)}
.ttable{font-size:15px;font-weight:800;flex:1}
.ttime{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px}
.ttime.urgent{background:var(--red);color:#fff}
.ttime.warn{background:var(--yellow-bg);color:var(--yellow)}
.ttime.ok{background:var(--green-bg);color:var(--green)}
.tbody{padding:8px 12px;max-height:260px;overflow-y:auto}
.titem{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);width:100%}
.titem:last-child{border-bottom:none}
.titem.done{opacity:.4;text-decoration:line-through}
.iqty{width:26px;height:26px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.iname{flex:1;font-size:13px;font-weight:600}
.icat{font-size:10px;color:var(--text3)}
.icheck{width:22px;height:22px;border-radius:5px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icheck.done{background:var(--accent);border-color:var(--accent);color:#fff}
.tnote{padding:5px 12px;font-size:12px;color:var(--orange);background:var(--orange-bg);border-top:1px solid var(--orange-bd)}
.tfoot{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:6px}
.tbtn{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.tbtn.start{background:var(--orange-bg);color:var(--orange);border:1.5px solid var(--orange-bd)}
.tbtn.done{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-bd)}
.empty{grid-column:1/-1;text-align:center;padding:60px;color:var(--text3);font-size:15px}
</style>
</head>

function buildSelect(){
  var sel=document.getElementById('login-role');
  if(!sel)return;
  sel.innerHTML='<option value="">— Mitarbeiter —</option>';
  staff.filter(function(s){return s.active;}).forEach(function(s){
    var o=document.createElement('option');o.value=s.id;
    o.textContent=s.fname+' '+(s.lname||'');sel.appendChild(o);
  });
}

function initPins(){
  var pins=document.querySelectorAll('.pin');
  pins.forEach(function(el,i){
    el.setAttribute('readonly','');
    el.addEventListener('focus',function(){this.removeAttribute('readonly');this.value='';});
    el.addEventListener('input',function(){
      if(this.value&&i<pins.length-1)pins[i+1].focus();
      else if(i===pins.length-1){if(Array.from(pins).every(function(p){return p.value;}))doLogin();}
    });
    el.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!this.value&&i>0)pins[i-1].focus();});
  });
}

function clearPins(){document.querySelectorAll('.pin').forEach(function(el){el.value='';el.setAttribute('readonly','');});}

function doLogin(){
  var sid=parseInt(document.getElementById('login-role').value);
  var pin=Array.from(document.querySelectorAll('.pin')).map(function(p){return p.value;}).join('');
  var m=staff.find(function(s){return s.id===sid;});
  if(!m){document.getElementById('login-err').textContent='Bitte Mitarbeiter wählen';return;}
  if(m.pin!==pin&&!(pin==='0000'&&m.role==='manager')){document.getElementById('login-err').textContent='Falscher PIN';clearPins();document.querySelectorAll('.pin')[0].focus();return;}
  document.getElementById('login').classList.add('hidden');
  var un=document.getElementById('topbar-user');if(un)un.textContent=m.fname;
  if(typeof afterLogin==='function')afterLogin(m);
}

function doLogout(){
  document.getElementById('login').classList.remove('hidden');
  clearPins();
  document.getElementById('login-err').textContent='';
  if(typeof afterLogout==='function')afterLogout();
}

function notify(msg,dur){var el=document.getElementById('notif');if(!el)return;el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},dur||2500);}

var BAR=['Cocktails','Spanish Drinks','Drinks'];
var orders=[],curF='all',timer=null;
function tw(){return lang==='de'?'Tisch ':lang==='en'?'Table ':'Meja ';}
function setF(f,btn){curF=f;document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');render();}
function onLangChange(){render();}

async function load(){
  try{
    // Lade Orders wo kitchen_status NICHT served ist
    var d=await sbGet('orders','select=id,table_number,kitchen_status,note,created_at,order_items(id,name,quantity,category)&kitchen_status=in.(new,cooking)&status=neq.paid&order=created_at.asc');
    orders=d.map(function(o){
      var items=(o.order_items||[]).filter(function(i){return BAR.indexOf(i.category)<0;});
      if(!items.length) return null;
      return {id:o.id,table:o.table_number,status:o.kitchen_status,note:o.note||'',
               ts:new Date(o.created_at).getTime(),
               items:items.map(function(i){return {id:i.id,name:i.name,qty:i.quantity,cat:i.category||'',done:false};})
      };
    }).filter(Boolean);
    document.getElementById('live').className='live';
    render();
  }catch(e){document.getElementById('live').className='live off';}
}

function render(){
  var filtered=curF==='all'?orders:orders.filter(function(o){return o.status===curF;});
  ['all','new','cooking'].forEach(function(k){
    var el=document.getElementById('n-'+k);
    if(el) el.textContent=(k==='all'?orders:orders.filter(function(o){return o.status===k;})).length;
  });
  var main=document.getElementById('main');
  if(!filtered.length){
    main.innerHTML='<div class="empty"><span class="l-de">Keine Bestellungen</span><span class="l-en">No orders</span><span class="l-id">Tidak ada pesanan</span></div>';
    document.body.className=lang;return;
  }
  main.innerHTML=filtered.map(function(o){
    var mins=Math.round((Date.now()-o.ts)/60000);
    var tc=mins>20?'urgent':mins>10?'warn':'ok';
    var items=o.items.map(function(it,idx){
      return '<div class="titem'+(it.done?' done':'')+'">'+
        '<div class="iqty">'+it.qty+'x</div>'+
        '<div style="flex:1"><div class="iname">'+it.name+'</div><div class="icat">'+it.cat+'</div></div>'+
        '<div class="icheck'+(it.done?' done':'')+'" onclick="tick('+o.id+','+idx+')">'+(it.done?'✓':'')+'</div>'+
        '</div>';
    }).join('');
    var note=o.note?'<div class="tnote">📝 '+o.note+'</div>':'';
    var btn='';
    if(o.status==='new') btn='<button class="tbtn start" onclick="upd('+o.id+',\'cooking\')"><span class="l-de">Beginnen</span><span class="l-en">Start</span><span class="l-id">Mulai</span></button>';
    else if(o.status==='cooking') btn='<button class="tbtn done" onclick="upd('+o.id+',\'served\')"><span class="l-de">Fertig & Abgeholt</span><span class="l-en">Done & Served</span><span class="l-id">Selesai</span></button>';
    return '<div class="ticket '+o.status+'">'+
      '<div class="thead '+o.status+'"><div class="ttable">'+tw()+o.table+'</div><span class="ttime '+tc+'">'+mins+' min</span></div>'+
      '<div class="tbody">'+items+'</div>'+note+
      '<div class="tfoot">'+btn+'</div></div>';
  }).join('');
  document.body.className=lang;
}

function tick(oid,idx){var o=orders.find(function(x){return x.id===oid;});if(o&&o.items[idx]){o.items[idx].done=!o.items[idx].done;render();}}

async function upd(oid,ns){
  var o=orders.find(function(x){return x.id===oid;});
  if(!o) return;
  o.status=ns;
  var patch={kitchen_status:ns};
  if(ns==='served') { patch.kitchen_served_at=new Date().toISOString(); orders=orders.filter(function(x){return x.id!==oid;}); }
  render();
  try{await sbPatch('orders','id=eq.'+oid,patch);}catch(e){notify('⚠ Verbindungsfehler');}
}

function afterLogin(){load();timer=setInterval(load,10000);}
function afterLogout(){if(timer)clearInterval(timer);orders=[];render();}

window.addEventListener('DOMContentLoaded',function(){loadStaff();initPins();});
</script>
</body>
