<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;background:#f5f2ed;color:#1a1815}
.topbar{background:#fff;border-bottom:1px solid #ddd;padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:99}
.topbar img{height:34px;object-fit:contain}
.lbs{display:flex;gap:4px;margin-left:auto}
.lb{padding:6px 11px;border-radius:6px;font-size:12px;font-weight:700;border:1px solid #ddd;background:#f5f2ed;color:#777;cursor:pointer}
.lb.on{background:#1a63a8;color:#fff;border-color:#1a63a8}
.catbar{padding:8px 12px;background:#fff;border-bottom:1px solid #eee;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.catbar::-webkit-scrollbar{display:none}
.cb{flex-shrink:0;padding:6px 13px;border-radius:16px;font-size:12px;font-weight:700;border:1px solid #ddd;background:#f5f2ed;color:#666;cursor:pointer;white-space:nowrap}
.cb.on{background:#1a63a8;color:#fff;border-color:#1a63a8}
.content{padding:10px 12px;max-width:800px;margin:0 auto}
.rc{background:#fff;border:1px solid #e0dcd5;border-radius:12px;margin-bottom:10px;overflow:hidden}
.rl{display:flex;align-items:center;cursor:pointer}
.rbar{width:5px;min-height:56px;align-self:stretch;flex-shrink:0}
.rnames{flex:1;padding:13px 12px}
.rn1{font-size:15px;font-weight:700;line-height:1.3}
.rn2{font-size:12px;color:#aaa;margin-top:2px}
.arr{padding:14px 14px 14px 0;font-size:13px;color:#bbb;flex-shrink:0;transition:transform .2s}
.rd{display:none;padding:14px;border-top:1px solid #eee;background:#faf9f6}
.rck{display:none}
.rck:checked~.rd{display:block}
.rck:checked~.rl .arr{transform:rotate(90deg)}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.rh{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.it{width:100%;border-collapse:collapse}
.it tr{border-bottom:1px solid #f0ede8}
.it tr:last-child{border-bottom:none}
.it td{padding:6px 2px;font-size:13px;line-height:1.4}
.am{text-align:right;color:#1a63a8;font-weight:700;font-family:monospace;font-size:12px;width:80px;padding-left:6px}
.sp{display:flex;gap:8px;margin-bottom:8px}
.sn{width:20px;height:20px;border-radius:50%;background:#e8eef9;color:#1a63a8;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.st{font-size:13px;color:#555;line-height:1.55;flex:1}
.note{margin-top:10px;font-size:12px;color:#999;font-style:italic;padding-top:8px;border-top:1px solid #eee}
@media(max-width:500px){.rg{grid-template-columns:1fr}}
</style>

function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(function(b,i){b.classList.toggle('on',['de','en','id'][i]===l);});
  renderCatBar();
  renderRecipes();
}

function renderCatBar(){
  var bar=document.getElementById('catbar');
  bar.innerHTML=cats[lang].map(function(c){
    return '<span class="cb'+(curCat===c[0]?' on':'')+'" onclick="filterCat(\''+c[0]+'\')">'+c[1]+'</span>';
  }).join('');
}

function filterCat(cat){
  curCat=cat;
  renderCatBar();
  renderRecipes();
}

    var ings=r.i[lang].map(function(x){return'<tr><td>'+x[0]+'</td><td class="am">'+x[1]+'</td></tr>';}).join('');
    var steps=r.s[lang].map(function(s,i){return'<div class="sp"><div class="sn">'+(i+1)+'</div><div class="st">'+s+'</div></div>';}).join('');
    var note=r.note?'<div class="note">'+r.note+'</div>':'';
    return '<div class="rc">'
      +'<input type="checkbox" class="rck" id="ck-'+r.id+'">'
      +'<label class="rl" for="ck-'+r.id+'">'
      +'<div class="rbar" style="background:'+col(r.cat)+'"></div>'
      +'<div class="rnames"><div class="rn1">'+nm+'</div><div class="rn2">'+others+'</div></div>'
      +'<div class="arr">▶</div></label>'
      +'<div class="rd"><div class="rg">'
      +'<div><div class="rh">'+head[lang].i+'</div><table class="it">'+ings+'</table></div>'
      +'<div><div class="rh">'+head[lang].s+'</div>'+steps+'</div>'
      +'</div>'+note+'</div></div>';
  }).join('');
}

window.addEventListener('DOMContentLoaded',function(){
  renderCatBar();
  renderRecipes();
});
</script>
