<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bar Rezepturen — Mata Villas</title>
<style>
:root{
  --bg:#eef2f7;--bg2:#f8fafc;--bg4:#e2e8f0;
  --border:#d1dbe8;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--red-bg:#fef2f2;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text)}
.topbar{background:#fff;border-bottom:1.5px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:9}
.topbar img{height:32px;object-fit:contain}
.topbar-title{font-size:14px;font-weight:700;color:var(--text2)}
.topbar-right{display:flex;gap:4px;margin-left:auto}
.lb{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font)}
.lb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.catbar{display:flex;gap:6px;padding:10px 14px;background:#fff;border-bottom:1.5px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:50px;z-index:8}
.catbar::-webkit-scrollbar{display:none}
.cbtn{flex-shrink:0;padding:5px 13px;border-radius:16px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--font)}
.cbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.content{padding:10px 14px;max-width:900px;margin:0 auto}
.add-btn{display:block;width:100%;margin:0 0 12px;padding:11px;border-radius:12px;font-size:14px;font-weight:700;border:2px dashed var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font);text-align:center}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.recipe-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.recipe-head{display:flex;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.recipe-bar{width:5px;min-height:58px;align-self:stretch;flex-shrink:0}
.recipe-info{flex:1;padding:12px 14px}
.recipe-name{font-size:15px;font-weight:700}
.recipe-sub{font-size:12px;color:var(--text3);margin-top:2px}
.recipe-arrow{padding:12px 14px;font-size:13px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.recipe-card.open .recipe-arrow{transform:rotate(90deg)}
.recipe-body{display:none;padding:14px;border-top:1.5px solid var(--border);background:var(--bg2)}
.recipe-card.open .recipe-body{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.ing-table{width:100%;border-collapse:collapse}
.ing-table tr{border-bottom:1px solid var(--border)}
.ing-table tr:last-child{border-bottom:none}
.ing-table td{padding:5px 3px;font-size:13px}
.ing-amt{text-align:right;color:var(--accent);font-weight:700;font-family:monospace;font-size:12px;width:70px}
.step{display:flex;gap:8px;margin-bottom:7px}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-text{font-size:13px;color:var(--text2);line-height:1.55;flex:1}
.glass-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600;background:var(--accent-bg);color:var(--accent);margin-top:8px}
.card-actions{grid-column:1/-1;display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--border);margin-top:4px}
.edit-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;border:1.5px solid var(--accent);background:var(--accent-bg);color:var(--accent);cursor:pointer;font-family:var(--font)}
.del-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;border:1.5px solid var(--red);background:var(--red-bg);color:var(--red);cursor:pointer;font-family:var(--font)}
/* Modal */
.modal-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal-bd.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1}
.modal-body{padding:16px 20px;max-height:65vh;overflow-y:auto}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.ef-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;margin-top:10px}
.ef-input,.ef-select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:#fff;color:var(--text);outline:none}
.ef-input:focus,.ef-textarea:focus{border-color:var(--accent)}
.ef-textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:#fff;color:var(--text);outline:none;resize:vertical}
.save-btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:var(--font)}
.cancel-btn{padding:8px 14px;border-radius:8px;font-size:13px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--font)}
.notif{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:8px;padding:9px 16px;font-size:13px;z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.notif.show{opacity:1}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}
@media(max-width:520px){.recipe-card.open .recipe-body{grid-template-columns:1fr}}
.l-de,.l-en,.l-id{display:none}
body.de .l-de,body.en .l-en,body.id .l-id{display:inline}
</style>
</head>

<script>
var SB_URL = "https://pxzdkyvndosikdmstnpp.supabase.co";
var SB_KEY = "sb_publishable_5n5o0frwleZ9srDUedY_mg_cjJQ8eMe";
var lang = 'de';
var currentCat = '';
var recipes = [];
var editId = null;

var catCols = {'Cocktails':'#2563eb','Spanish':'#a86e1a','Spirits':'#7c3aed'};
var catLabels = {
  de:{'':'Alle','Cocktails':'Cocktails','Spanish':'Spanish Drinks','Spirits':'Spirits & Wine'},
  en:{'':'All','Cocktails':'Cocktails','Spanish':'Spanish Drinks','Spirits':'Spirits & Wine'},
  id:{'':'Semua','Cocktails':'Koktail','Spanish':'Minuman Spanyol','Spirits':'Spirits & Wine'}
};

// ── Supabase ──────────────────────────────────────────────────
async function sbGet(table, query) {
  var r = await fetch(SB_URL+'/rest/v1/'+table+'?'+(query||''), {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}
  });
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function sbPost(table, data) {
  var r = await fetch(SB_URL+'/rest/v1/'+table, {
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function sbPatch(id, data) {
  var r = await fetch(SB_URL+'/rest/v1/bar_recipes?id=eq.'+id, {
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function sbDelete(id) {
  return fetch(SB_URL+'/rest/v1/bar_recipes?id=eq.'+id, {
    method:'DELETE',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
}

// ── Load ──────────────────────────────────────────────────────
async function loadRecipes() {
  try {
    var data = await sbGet('bar_recipes','order=sort_order,name_de');
    recipes = data;
    render();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="loading" style="color:var(--red)">&#10006; <span class="l-de">Verbindungsfehler</span><span class="l-en">Connection error</span><span class="l-id">Gagal terhubung</span></div>';
    document.body.className = lang;
  }
}

// ── Lang ──────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.body.className = l;
  document.querySelectorAll('.lb').forEach(function(b,i){b.classList.toggle('on',['de','en','id'][i]===l);});
  render();
}

// ── Render ────────────────────────────────────────────────────
function render() {
  // Catbar
  var catbar = document.getElementById('catbar');
  catbar.innerHTML = '';
  ['','Cocktails','Spanish','Spirits'].forEach(function(c){
    var btn = document.createElement('button');
    btn.className = 'cbtn'+(currentCat===c?' on':'');
    btn.textContent = (catLabels[lang]||catLabels.de)[c]||c;
    btn.onclick = function(){currentCat=c;render();};
    catbar.appendChild(btn);
  });

  var content = document.getElementById('content');
  content.innerHTML = '';

  // Add button
  var addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.innerHTML = '+ <span class="l-de">Neues Rezept hinzufügen</span><span class="l-en">Add new recipe</span><span class="l-id">Tambah resep baru</span>';
  addBtn.onclick = function(){openModal(null);};
  content.appendChild(addBtn);

  // Filter
  var filtered = currentCat ? recipes.filter(function(r){return r.category===currentCat;}) : recipes;

  filtered.forEach(function(r) {
    var col = catCols[r.category]||'#888';
    var nm = r['name_'+lang]||r.name_de;
    var glass = r['glass_'+lang]||r.glass_de||'';
    var ings = (r['ingredients_'+lang]||r.ingredients_de||[]).map(function(x){
      return '<tr><td>'+x[0]+'</td><td class="ing-amt">'+x[1]+'</td></tr>';
    }).join('');
    var steps = (r['steps_'+lang]||r.steps_de||[]).map(function(s,i){
      return '<div class="step"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+s+'</div></div>';
    }).join('');

    var div = document.createElement('div');
    div.className = 'recipe-card';
    div.id = 'rc-'+r.id;
    div.innerHTML = '<div class="recipe-head" onclick="toggleCard('+r.id+')">'
      +'<div class="recipe-bar" style="background:'+col+'"></div>'
      +'<div class="recipe-info"><div class="recipe-name">'+nm+'</div>'
      +'<div class="recipe-sub">'+r.category+(glass?' &nbsp;·&nbsp; &#127803; '+glass:'')+'</div></div>'
      +'<div class="recipe-arrow">&#9654;</div>'
      +'</div>'
      +'<div class="recipe-body">'
      +'<div><div class="section-title"><span class="l-de">Zutaten</span><span class="l-en">Ingredients</span><span class="l-id">Bahan-bahan</span></div>'
      +'<table class="ing-table">'+ings+'</table>'
      +(glass?'<div class="glass-badge">&#127803; '+glass+'</div>':'')+'</div>'
      +'<div><div class="section-title"><span class="l-de">Zubereitung</span><span class="l-en">Preparation</span><span class="l-id">Cara Membuat</span></div>'
      +steps+'</div>'
      +'<div class="card-actions">'
      +'<button class="edit-btn" onclick="openModal('+r.id+')">&#9998; <span class="l-de">Bearbeiten</span><span class="l-en">Edit</span><span class="l-id">Edit</span></button>'
      +'<button class="del-btn" onclick="deleteRecipe('+r.id+')">&#10005; <span class="l-de">Löschen</span><span class="l-en">Delete</span><span class="l-id">Hapus</span></button>'
      +'</div>'
      +'</div>';
    content.appendChild(div);
  });
  document.body.className = lang;
}

function toggleCard(id) {
  var card = document.getElementById('rc-'+id);
  if(card) card.classList.toggle('open');
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(id) {
  editId = id;
  var r = id ? recipes.find(function(x){return x.id===id;}) : null;
  var titles = {de:id?'Rezept bearbeiten':'Neues Rezept',en:id?'Edit Recipe':'New Recipe',id:id?'Edit Resep':'Resep Baru'};
  document.getElementById('modal-title').textContent = titles[lang];

  var catOpts = ['Cocktails','Spanish','Spirits'].map(function(c){
    return '<option value="'+c+'"'+(r&&r.category===c?' selected':'')+'>'+catLabels[lang][c]+'</option>';
  }).join('');

  var parseArr = function(arr){ return (arr||[]).map(function(x){return x[0]+'|'+x[1];}).join('\n'); };

  var parseSteps = function(arr){ return (arr||[]).join('\n'); };


  document.getElementById('modal-body').innerHTML =
    '<label class="ef-label">Name (DE)</label><input class="ef-input" id="ef-name-de" value="'+(r?r.name_de||'':'')+'">'
    +'<label class="ef-label">Name (EN)</label><input class="ef-input" id="ef-name-en" value="'+(r?r.name_en||'':'')+'">'
    +'<label class="ef-label">Name (ID)</label><input class="ef-input" id="ef-name-id" value="'+(r?r.name_id||'':'')+'">'
    +'<label class="ef-label"><span class="l-de">Kategorie</span><span class="l-en">Category</span><span class="l-id">Kategori</span></label>'
    +'<select class="ef-input ef-select" id="ef-cat">'+catOpts+'</select>'
    +'<label class="ef-label"><span class="l-de">Glas (DE/EN/ID)</span><span class="l-en">Glass (DE/EN/ID)</span><span class="l-id">Gelas (DE/EN/ID)</span></label>'
    +'<input class="ef-input" id="ef-glass" value="'+(r?r.glass_de||'':'')+'">'
    +'<label class="ef-label"><span class="l-de">Zutaten DE (Name|Menge, je Zeile)</span><span class="l-en">Ingredients DE</span><span class="l-id">Bahan DE</span></label>'
    +'<textarea class="ef-textarea" id="ef-i-de" rows="5">'+parseArr(r?r.ingredients_de:[])+'</textarea>'
    +'<label class="ef-label"><span class="l-de">Zutaten EN</span><span class="l-en">Ingredients EN</span><span class="l-id">Bahan EN</span></label>'
    +'<textarea class="ef-textarea" id="ef-i-en" rows="5">'+parseArr(r?r.ingredients_en:[])+'</textarea>'
    +'<label class="ef-label"><span class="l-de">Zutaten ID</span><span class="l-en">Ingredients ID</span><span class="l-id">Bahan ID</span></label>'
    +'<textarea class="ef-textarea" id="ef-i-id" rows="5">'+parseArr(r?r.ingredients_id:[])+'</textarea>'
    +'<label class="ef-label"><span class="l-de">Zubereitung DE (je Schritt eine Zeile)</span><span class="l-en">Steps DE</span><span class="l-id">Cara Membuat DE</span></label>'
    +'<textarea class="ef-textarea" id="ef-s-de" rows="4">'+parseSteps(r?r.steps_de:[])+'</textarea>'
    +'<label class="ef-label"><span class="l-de">Zubereitung EN</span><span class="l-en">Steps EN</span><span class="l-id">Cara Membuat EN</span></label>'
    +'<textarea class="ef-textarea" id="ef-s-en" rows="4">'+parseSteps(r?r.steps_en:[])+'</textarea>'
    +'<label class="ef-label"><span class="l-de">Zubereitung ID</span><span class="l-en">Steps ID</span><span class="l-id">Cara Membuat ID</span></label>'
    +'<textarea class="ef-textarea" id="ef-s-id" rows="4">'+parseSteps(r?r.steps_id:[])+'</textarea>';

  document.getElementById('modal').classList.add('open');
  document.body.className = lang;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function parseIngs(txt) {
  return (txt||'').split('\n').filter(function(l){return l.trim();}).map(function(l){
    var p = l.split('|'); return [(p[0]||'').trim(),(p[1]||'').trim()];
    var p = l.split('|'); return [(p[0]||'').trim(),(p[1]||'').trim()];
  });
}

async function saveRecipe() {
  var name = document.getElementById('ef-name-de').value.trim();
  if(!name){notify('Name fehlt!');return;}
  var glass = document.getElementById('ef-glass').value.trim();
  var data = {
    name_de: name,
    name_en: document.getElementById('ef-name-en').value||name,
    name_id: document.getElementById('ef-name-id').value||name,
    category: document.getElementById('ef-cat').value,
    glass_de: glass, glass_en: glass, glass_id: glass,
    ingredients_de: parseIngs(document.getElementById('ef-i-de').value),
    ingredients_en: parseIngs(document.getElementById('ef-i-en').value),
    ingredients_id: parseIngs(document.getElementById('ef-i-id').value),
    steps_de: (document.getElementById('ef-s-de').value||'').split('\n').filter(function(l){return l.trim();}),

    steps_en: (document.getElementById('ef-s-en').value||'').split('\n').filter(function(l){return l.trim();}),

    steps_id: (document.getElementById('ef-s-id').value||'').split('\n').filter(function(l){return l.trim();}),

    updated_at: new Date().toISOString()
  };
  try {
    if(editId) {
      await sbPatch(editId, data);
      notify('✓ ' + (lang==='de'?'Gespeichert':lang==='en'?'Saved':'Disimpan'));
    } else {
      await sbPost('bar_recipes', data);
      notify('✓ ' + (lang==='de'?'Rezept hinzugefügt':lang==='en'?'Recipe added':'Resep ditambahkan'));
    }
    closeModal();
    loadRecipes();
  } catch(e) {
    notify('&#10006; ' + (lang==='de'?'Fehler beim Speichern':lang==='en'?'Save error':'Gagal menyimpan'));
  }
}

async function deleteRecipe(id) {
  var confirmMsg = lang==='de'?'Wirklich löschen?':lang==='en'?'Really delete?':'Benar-benar hapus?';
  if(!confirm(confirmMsg)) return;
  try {
    await sbDelete(id);
    notify('✓ ' + (lang==='de'?'Gelöscht':lang==='en'?'Deleted':'Dihapus'));
    loadRecipes();
  } catch(e) {
    notify('&#10006; Fehler');
  }
}

function notify(msg) {
  var el = document.getElementById('notif');
  el.innerHTML = msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}

// ── Init ──────────────────────────────────────────────────────
loadRecipes();
</script>
