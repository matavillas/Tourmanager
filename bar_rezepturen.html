<title>Bar Rezepturen — Mata Villas</title>
<style>
:root{
  --bg:#eef2f7;--bg2:#f8fafc;--bg4:#e2e8f0;
  --border:#d1dbe8;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --green:#16a34a;--green-bg:#f0fdf4;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text)}

.topbar{background:#fff;border-bottom:1.5px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:9}
.topbar img{height:32px;object-fit:contain}
.topbar-title{font-size:14px;font-weight:700;color:var(--text2)}
.lbs{display:flex;gap:4px;margin-left:auto}
.lb{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font)}
.lb.on{background:var(--accent);border-color:var(--accent);color:#fff}

.catbar{display:flex;gap:6px;padding:10px 14px;background:#fff;border-bottom:1.5px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:50px;z-index:8}
.catbar::-webkit-scrollbar{display:none}
.cbtn{flex-shrink:0;padding:5px 13px;border-radius:16px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--font);white-space:nowrap}
.cbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}

.content{padding:10px 14px;max-width:900px;margin:0 auto}

.recipe-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.recipe-head{display:flex;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.recipe-bar{width:5px;min-height:58px;align-self:stretch;flex-shrink:0}
.recipe-info{flex:1;padding:12px 14px}
.recipe-name{font-size:15px;font-weight:700}
.recipe-sub{font-size:12px;color:var(--text3);margin-top:2px}
.recipe-arrow{padding:12px 14px;font-size:13px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.recipe-card.open .recipe-arrow{transform:rotate(90deg)}

.recipe-body{display:none;padding:14px;border-top:1.5px solid var(--border);background:var(--bg2)}
.recipe-card.open .recipe-body{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.ing-table{width:100%;border-collapse:collapse}
.ing-table tr{border-bottom:1px solid var(--border)}
.ing-table tr:last-child{border-bottom:none}
.ing-table td{padding:5px 3px;font-size:13px}
.ing-amt{text-align:right;color:var(--accent);font-weight:700;font-family:monospace;font-size:12px;width:70px}

.step{display:flex;gap:8px;margin-bottom:7px}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-text{font-size:13px;color:var(--text2);line-height:1.55;flex:1}

.glass-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600;background:var(--accent-bg);color:var(--accent);margin-top:8px}

@media(max-width:520px){.recipe-card.open .recipe-body{grid-template-columns:1fr}}
@media print{.topbar,.catbar{display:none}.recipe-card.open .recipe-body{display:grid}}

.l-de,.l-en,.l-id{display:none}
body.de .l-de,body.en .l-en,body.id .l-id{display:inline}
</style>
</head>

   name:{de:'Small Bintang', en:'Small Bintang', id:'Bintang Kecil'},
   glass:{de:'Bierglas / Flasche', en:'Beer glass / bottle', id:'Gelas bir / botol'},
   i:{
     de:[['Bintang Bier (330 ml)','1 Flasche']],
     en:[['Bintang beer (330 ml)','1 bottle']],
     id:[['Bir Bintang (330 ml)','1 botol']]
   },
   s:{
     de:['Gut gekühlt servieren (4–6°C).','In Bierglas einschenken oder direkt als Flasche servieren.'],
     en:['Serve well chilled (4–6°C).','Pour into beer glass or serve directly as bottle.'],
     id:['Sajikan dalam keadaan sangat dingin (4–6°C).','Tuang ke gelas bir atau sajikan langsung dalam botol.']
   }},
];

function setLang(l) {
  lang = l;
  document.body.className = l;
  document.querySelectorAll('.lb').forEach(function(b,i){
    b.classList.toggle('on', ['de','en','id'][i]===l);
  });
  render();
}

function buildCatBar() {
  var bar = document.getElementById('catbar');
  bar.innerHTML = '';
  cats[lang].forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'cbtn' + (currentCat===c[0]?' on':'');
    btn.textContent = c[1];
    btn.onclick = function() {
      currentCat = c[0];
      document.querySelectorAll('.cbtn').forEach(function(b){b.classList.remove('on');});
      this.classList.add('on');
      render();
    };
    bar.appendChild(btn);
  });
}

function render() {
  buildCatBar();
  var items = currentCat ? R.filter(function(r){return r.cat===currentCat;}) : R;
  var content = document.getElementById('content');
  content.innerHTML = '';
  items.forEach(function(r) {
    var col = catCols[r.cat] || '#888';
    var div = document.createElement('div');
    div.className = 'recipe-card';
    div.id = 'rc-'+r.id;

    var ings = (r.i[lang]||r.i.de).map(function(x){
      return '<tr><td>'+x[0]+'</td><td class="ing-amt">'+x[1]+'</td></tr>';
    }).join('');

    var steps = (r.s[lang]||r.s.de).map(function(s,i){
      return '<div class="step"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+s+'</div></div>';
    }).join('');

    var glassBadge = '<div class="glass-badge">🥃 '+(r.glass[lang]||r.glass.de)+'</div>';

    div.innerHTML = '<div class="recipe-head" onclick="toggleCard('+r.id+')">'
      +'<div class="recipe-bar" style="background:'+col+'"></div>'
      +'<div class="recipe-info">'
      +'<div class="recipe-name">'+r.name[lang]+'</div>'
      +'<div class="recipe-sub">'+r.cat+'</div>'
      +'</div>'
      +'<div class="recipe-arrow">▶</div>'
      +'</div>'
      +'<div class="recipe-body">'
      +'<div><div class="section-title"><span class="l-de">Zutaten</span><span class="l-en">Ingredients</span><span class="l-id">Bahan-bahan</span></div>'
      +'<table class="ing-table">'+ings+'</table>'
      +glassBadge+'</div>'
      +'<div><div class="section-title"><span class="l-de">Zubereitung</span><span class="l-en">Preparation</span><span class="l-id">Cara Membuat</span></div>'
      +steps+'</div>'
      +'</div>';
    content.appendChild(div);
  });
}

function toggleCard(id) {
  var card = document.getElementById('rc-'+id);
  card.classList.toggle('open');
}

render();
</script>
</body>
</html>
