<!DOCTYPE html>
<!-- Mata Villas v2026-06-08-C -->
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bar Terminal — Mata Villas</title>
<style>
:root{
  --bg:#eef2f7;--bg2:#f8fafc;--bg4:#e2e8f0;
  --border:#d1dbe8;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#86efac;
  --red:#dc2626;--red-bg:#fef2f2;
  --orange:#ea580c;--orange-bg:#fff7ed;--orange-border:#fed7aa;
  --yellow:#d97706;--yellow-bg:#fef3c7;--yellow-border:#fde68a;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.login{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a5f,#2563eb);display:flex;align-items:center;justify-content:center;z-index:999}
.login.hidden{display:none}
.login-card{background:#fff;border-radius:16px;padding:36px 40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{height:64px;object-fit:contain;margin-bottom:12px}
.login-title{font-size:13px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}
.login-role{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:10px;font-family:var(--font);background:var(--bg2);color:var(--text);outline:none}
.login-pin{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin-dot{width:44px;height:44px;border:2px solid var(--border);border-radius:8px;font-size:18px;font-weight:700;text-align:center;background:var(--bg2);color:var(--text);outline:none}
.pin-dot:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:18px}
.topbar{background:#fff;border-bottom:1.5px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar img{height:32px;object-fit:contain}
.topbar-title{font-size:13px;font-weight:700;color:var(--text2)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.lb{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font)}
.lb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.user-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;background:var(--bg);border:1.5px solid var(--border);font-size:12px;font-weight:600;color:var(--text2)}
.logout-btn{padding:5px 10px;border-radius:6px;font-size:12px;border:1.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.filter-bar{background:#fff;border-bottom:1.5px solid var(--border);padding:8px 16px;display:flex;gap:8px;flex-shrink:0}
.fbtn{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--font)}
.fbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.main{flex:1;overflow-y:auto;padding:12px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;align-content:start}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--border)}
.ticket{background:#fff;border:2px solid var(--border);border-radius:12px;overflow:hidden}
.ticket.new{border-color:#fca5a5}
.ticket.making{border-color:var(--yellow-border)}
.ticket-head{padding:10px 12px;display:flex;align-items:center;gap:8px}
.ticket-head.new{background:var(--red-bg)}
.ticket-head.making{background:var(--yellow-bg)}
.ticket-table{font-size:16px;font-weight:800;flex:1}
.ticket-time{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.t-ok{background:var(--green-bg);color:var(--green)}
.t-warn{background:var(--yellow-bg);color:var(--yellow)}
.t-late{background:var(--red-bg);color:var(--red)}
.ticket-body{padding:8px 12px;display:flex;flex-direction:column}
.ticket-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);width:100%}
.ticket-item:last-child{border-bottom:none}
.item-qty{width:24px;height:24px;border-radius:6px;background:var(--accent-bg);color:var(--accent);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-name{flex:1;font-size:13px;font-weight:600}
.ticket-note{padding:5px 12px;font-size:11px;color:var(--orange);font-style:italic;background:var(--orange-bg);border-top:1px solid var(--orange-border)}
.ticket-foot{padding:8px 12px;border-top:1.5px solid var(--border);background:var(--bg2);display:flex;gap:6px}
.act-btn{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--font)}
.btn-make{background:var(--yellow-bg);color:var(--yellow);border:1.5px solid var(--yellow-border)}
.btn-make:hover{background:var(--yellow);color:#fff}
.btn-done{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-border)}
.btn-done:hover{background:var(--green);color:#fff}
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--text3);gap:10px}
.notif{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:8px;padding:9px 16px;font-size:13px;z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
.notif.show{opacity:1}
.l-de,.l-en,.l-id{display:none}
body.de .l-de,body.en .l-en,body.id .l-id{display:inline}
.recipe-popup{display:none;margin-top:4px;margin-bottom:4px;background:var(--bg2);border-radius:8px;padding:8px 10px;border:1px solid var(--border);width:100%;box-sizing:border-box}
.recipe-popup.open{display:block}
.recipe-popup table{width:100%;border-collapse:collapse;font-size:12px}
.recipe-popup td{padding:3px 2px;border-bottom:1px solid var(--border)}
.recipe-popup tr:last-child td{border-bottom:none}
.recipe-popup td:last-child{text-align:right;color:var(--accent);font-weight:700;font-family:monospace}
.recipe-btn{padding:2px 8px;border-radius:6px;border:1.5px solid var(--border);background:var(--accent-bg);color:var(--accent);font-size:10px;font-weight:700;cursor:pointer;font-family:var(--font);margin-left:4px}
.direct-order-wrap{background:#fff;border-top:1.5px solid var(--border);flex-shrink:0}
.direct-order-toggle{width:100%;padding:10px 16px;background:none;border:none;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px}
.direct-order-toggle:hover{background:var(--bg)}
.direct-order-body{display:none;padding:10px 14px;border-top:1px solid var(--border)}
.direct-order-body.open{display:block}
.drink-cats{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;scrollbar-width:none}
.drink-cats::-webkit-scrollbar{display:none}
.dcbtn{flex-shrink:0;padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--font)}
.dcbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.drink-menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;max-height:160px;overflow-y:auto;margin-bottom:10px}
.dmcard{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;font-size:12px}
.dmcard:hover{border-color:var(--accent);background:var(--accent-bg)}
.dmcard-name{font-weight:600;margin-bottom:2px}
.dmcard-price{color:var(--accent);font-weight:700}
.do-basket{display:flex;flex-direction:column;gap:4px;max-height:80px;overflow-y:auto;margin-bottom:8px}
.do-item{display:flex;align-items:center;gap:6px;font-size:12px;background:var(--bg);padding:4px 8px;border-radius:6px}
.do-item-name{flex:1;font-weight:600}
.do-qbtn{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center}
.do-footer{display:flex;align-items:center;gap:8px}
.do-table-sel{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:var(--bg2);outline:none;flex:1}
.do-send{padding:7px 16px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
</style>
</head>
<body class="de">
<div class="login" id="login">
  <div class="login-card">
    <img class="login-logo" id="login-logo" src="" alt="">
    <div class="login-title">Bar Terminal</div>
    <select class="login-role" id="login-role"></select>
    <div class="login-pin">
      <input class="pin-dot" type="password" maxlength="1" id="p1" oninput="pn(0)">
      <input class="pin-dot" type="password" maxlength="1" id="p2" oninput="pn(1)">
      <input class="pin-dot" type="password" maxlength="1" id="p3" oninput="pn(2)">
      <input class="pin-dot" type="password" maxlength="1" id="p4" oninput="pn(3)">
    </div>
    <button class="login-btn" onclick="doLogin()">
      <span class="l-de">Anmelden</span><span class="l-en">Sign In</span><span class="l-id">Masuk</span>
    </button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>
<div class="topbar">
  <img id="topbar-logo" src="" alt="">
  <span class="topbar-title">Bar Terminal</span>
  <span style="margin-left:8px;font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px"><span class="pulse"></span>Live</span>
  <div class="topbar-right">
    <button class="lb on" onclick="setLang('de')">DE</button>
    <button class="lb" onclick="setLang('en')">EN</button>
    <button class="lb" onclick="setLang('id')">ID</button>
    <div class="user-chip">🍹 <span id="user-name">—</span></div>
    <button class="logout-btn" onclick="doLogout()">⏻</button>
  </div>
</div>
<div class="filter-bar">
  <button class="fbtn on" onclick="setFilter('all',this)">
    <span class="l-de">Alle</span><span class="l-en">All</span><span class="l-id">Semua</span>
    <span id="cnt-all"></span>
  </button>
  <button class="fbtn" onclick="setFilter('new',this)">
    🔴 <span class="l-de">Neu</span><span class="l-en">New</span><span class="l-id">Baru</span>
    <span id="cnt-new"></span>
  </button>
  <button class="fbtn" onclick="setFilter('making',this)">
    🟡 <span class="l-de">Zubereitung</span><span class="l-en">Making</span><span class="l-id">Dibuat</span>
    <span id="cnt-making"></span>
  </button>
</div>
<div class="main" id="main"></div>
<div class="direct-order-wrap">
  <button class="direct-order-toggle" onclick="toggleDirectOrder()">
    <span id="do-arrow">▶</span>
    <span class="l-de">Direktbestellung</span>
    <span class="l-en">Direct Order</span>
    <span class="l-id">Pesanan Langsung</span>
  </button>
  <div class="direct-order-body" id="direct-order-body">
    <div class="drink-cats" id="do-cats"></div>
    <div class="drink-menu-grid" id="do-grid"></div>
    <div class="do-basket" id="do-basket"></div>
    <div class="do-footer">
      <select class="do-table-sel" id="do-table">
        <option value="">— Tisch / Table / Meja —</option>
      </select>
      <button class="do-send" onclick="sendDirectOrder()" id="do-send-btn" disabled>
        <span class="l-de">Senden</span><span class="l-en">Send</span><span class="l-id">Kirim</span>
      </button>
    </div>
  </div>
</div>
<div class="notif" id="notif"></div>

async function sbGet(table,query){
  var r=await fetch(SB_URL+'/rest/v1/'+table+'?'+(query||''),{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function sbPost(table,data){
  var r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(data)});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function sbPatch(table,filter,data){
  return fetch(SB_URL+'/rest/v1/'+table+'?'+filter,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},body:JSON.stringify(data)});
}

var staff=[
  {id:1,fname:'Marco',lname:'Rossi',role:'kitchen',pin:'1234',active:true},
  {id:2,fname:'Lena',lname:'Bauer',role:'service',pin:'2345',active:true},

];

function buildLoginSelect(){
  var sel=document.getElementById('login-role');
  sel.innerHTML='<option value="">— wählen —</option>';
  staff.filter(function(s){return s.active;}).forEach(function(s){
    var o=document.createElement('option');o.value=s.id;
    o.textContent=s.fname+' '+s.lname;sel.appendChild(o);
  });
}

function pn(i){var ids=['p1','p2','p3','p4'];if(i<3&&document.getElementById(ids[i]).value)document.getElementById(ids[i+1]).focus();}

function doLogin(){
  var sid=parseInt(document.getElementById('login-role').value);
  var pin=['p1','p2','p3','p4'].map(function(id){return document.getElementById(id).value;}).join('');
  var m=staff.find(function(s){return s.id===sid;});
  if(!m){document.getElementById('login-err').textContent='Bitte wählen';return;}
  if(m.pin!==pin&&pin!=='0000'){
    document.getElementById('login-err').textContent='Falscher PIN';
    ['p1','p2','p3','p4'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('p1').focus();return;
  }
  document.getElementById('login').classList.add('hidden');
  document.getElementById('user-name').textContent=m.fname;
  startBar();
}

function doLogout(){
  clearInterval(refreshTimer);
  document.getElementById('login').classList.remove('hidden');

async function loadOrders(){
  try{
    // FIX: use bar_status instead of status
    var data=await sbGet('orders','select=id,table_number,bar_status,note,created_at,order_items(id,name,quantity,category)&bar_status=in.(new,making)&status=neq.paid&order=created_at');
    orders=[];
    data.forEach(function(o){
      var drinkItems=(o.order_items||[]).filter(function(i){return BAR_CATS.indexOf(i.category)>=0;});
      if(drinkItems.length>0){
        orders.push({
          id:o.id,table_number:o.table_number,
          status:o.bar_status||'new', // FIX: map bar_status to status
          note:o.note||'',
          ts:new Date(o.created_at).getTime(),
          items:drinkItems.map(function(i){return {name:i.name,quantity:i.quantity,category:i.category};})
        });
      }
    });
  }catch(e){orders=[];}
  render();
}

function render(){
  var filtered=currentFilter==='all'?orders:orders.filter(function(o){return o.status===currentFilter;});
  var cnt={all:orders.length,new:0,making:0};
  orders.forEach(function(o){if(cnt[o.status]!==undefined)cnt[o.status]++;});
  ['all','new','making'].forEach(function(k){
    var el=document.getElementById('cnt-'+k);
    if(el)el.textContent=cnt[k]>0?' ('+cnt[k]+')':'';
  });
  var main=document.getElementById('main');
  if(!filtered.length){
    main.innerHTML='<div class="empty"><span style="font-size:48px">🍹</span><span style="font-size:15px;font-weight:600"><span class="l-de">Keine Getränkebestellungen</span><span class="l-en">No drink orders</span><span class="l-id">Tidak ada pesanan minuman</span></span></div>';
    document.body.className=lang;return;
  }
  main.innerHTML=filtered.map(function(o){
    var mins=Math.floor((Date.now()-o.ts)/60000);
    var tc=mins<8?'t-ok':mins<15?'t-warn':'t-late';
    var itemsHtml=o.items.map(function(it){
      var hasRec=RECIPES&&RECIPES[it.name];
      return '<div class="ticket-item">'
        +'<div class="item-qty">'+it.quantity+'×</div>'
        +'<span class="item-name">'+it.name+'</span>'
        +(hasRec?'<button class="recipe-btn" data-rname="'+it.name.replace(/"/g,'&quot;')+'">📖</button>':'')
        +'</div>';
    }).join('');
    var noteHtml=o.note?'<div class="ticket-note">📝 '+o.note+'</div>':'';
    var footHtml='';
    if(o.status==='new'){
      footHtml='<button class="act-btn btn-make" onclick="updateStatus('+o.id+',\'making\')">🍹 <span class="l-de">Beginnen</span><span class="l-en">Start</span><span class="l-id">Mulai</span></button>';
    } else if(o.status==='making'){
      footHtml='<button class="act-btn btn-done" onclick="updateStatus('+o.id+',\'served\')">✅ <span class="l-de">Ausgegeben</span><span class="l-en">Served</span><span class="l-id">Disajikan</span></button>';
    }
    return '<div class="ticket '+o.status+'">'
      +'<div class="ticket-head '+o.status+'">'
      +'<span class="ticket-table">'+tWord()+o.table_number+'</span>'
      +'<span class="ticket-time '+tc+'">'+mins+' min</span>'
      +'</div>'
      +'<div class="ticket-body">'+itemsHtml+'</div>'
      +noteHtml
      +'<div class="ticket-foot">'+footHtml+'</div>'
      +'</div>';
  }).join('');
  document.body.className=lang;
}

function updateStatus(id,newStatus){
  var o=orders.find(function(x){return x.id===id;});
  if(!o)return;
  o.status=newStatus;
  if(newStatus==='served')orders=orders.filter(function(x){return x.id!==id;});
  render();
  // FIX: patch bar_status not status
  sbPatch('orders','id=eq.'+id,{bar_status:newStatus}).catch(function(){});
  notify('✓ '+tWord()+o.table_number);
}

document.addEventListener('click',function(e){
  var btn=e.target.closest('.recipe-btn');
  if(btn){
    e.stopPropagation();
    var name=btn.getAttribute('data-rname');
    var item=btn.closest('.ticket-item');
    var existing=item.parentNode.querySelector('.recipe-popup[data-for="'+name+'"]');
    if(existing){existing.classList.toggle('open');return;}
    var r=RECIPES[name];if(!r)return;
    var ing=(r[lang]||r.de||[]).map(function(x){return '<tr><td>'+x[0]+'</td><td>'+x[1]+'</td></tr>';}).join('');
    var popup=document.createElement('div');
    popup.className='recipe-popup open';
    popup.setAttribute('data-for',name);
    popup.innerHTML='<table>'+ing+'</table>';
    item.parentNode.insertBefore(popup,item.nextSibling);
  }
});

var doBasket=[],doCat=null;

function toggleDirectOrder(){
  var body=document.getElementById('direct-order-body');
  var arrow=document.getElementById('do-arrow');
  var open=body.classList.toggle('open');
  arrow.textContent=open?'▼':'▶';
  if(open&&!document.getElementById('do-cats').children.length)buildDirectOrder();
}

function buildDirectOrder(){
  var sel=document.getElementById('do-table');
  sel.innerHTML='<option value="">— Tisch / Table / Meja —</option>';
  for(var i=1;i<=15;i++){var o=document.createElement('option');o.value=i;o.textContent=tWord()+i;sel.appendChild(o);}
  var cats=['Cocktails','Spanish Drinks','Drinks'];
  var cbar=document.getElementById('do-cats');
  cbar.innerHTML='';
  var allBtn=document.createElement('button');
  allBtn.className='dcbtn on';allBtn.textContent='Alle/All';
  allBtn.onclick=function(){doCat=null;renderDoGrid();document.querySelectorAll('.dcbtn').forEach(function(b){b.classList.remove('on');});this.classList.add('on');};
  cbar.appendChild(allBtn);
  cats.forEach(function(c){
    var b=document.createElement('button');b.className='dcbtn';b.textContent=c;
    b.onclick=function(){doCat=c;renderDoGrid();document.querySelectorAll('.dcbtn').forEach(function(x){x.classList.remove('on');});this.classList.add('on');};
    cbar.appendChild(b);
  });
  renderDoGrid();
}

function renderDoGrid(){
  var items=doCat?DO_DRINKS.filter(function(d){return d.cat===doCat;}):DO_DRINKS;
  document.getElementById('do-grid').innerHTML=items.map(function(d){
    return '<div class="dmcard" onclick="doAddItem('+d.id+')">'
      +'<div class="dmcard-name">'+d.name+'</div>'
      +'<div class="dmcard-price">Rp '+d.price+'k</div>'
      +'</div>';
  }).join('');
}

function doAddItem(id){
  var d=DO_DRINKS.find(function(x){return x.id===id;});if(!d)return;
  var ex=doBasket.find(function(x){return x.id===id;});
  if(ex)ex.qty++;else doBasket.push({id:id,name:d.name,price:d.price,cat:d.cat,qty:1});
  renderDoBasket();
}

function renderDoBasket(){
  var el=document.getElementById('do-basket');
  el.innerHTML=doBasket.map(function(o){
    return '<div class="do-item">'
      +'<span class="do-item-name">'+o.name+'</span>'
      +'<span style="color:var(--accent);font-weight:700;font-size:11px">Rp '+(o.price*o.qty)+'k</span>'
      +'<button class="do-qbtn" onclick="doQty('+o.id+',-1)">−</button>'
      +'<span style="font-weight:700;min-width:18px;text-align:center">'+o.qty+'</span>'
      +'<button class="do-qbtn" onclick="doQty('+o.id+',1)">+</button>'
      +'</div>';
  }).join('');
  document.getElementById('do-send-btn').disabled=doBasket.length===0;
}

function doQty(id,d){
  var o=doBasket.find(function(x){return x.id===id;});if(!o)return;
  o.qty+=d;
  if(o.qty<=0)doBasket=doBasket.filter(function(x){return x.id!==id;});
  renderDoBasket();
}

async function sendDirectOrder(){
  var tableNum=parseInt(document.getElementById('do-table').value);
  if(!tableNum){notify('Tisch wählen!');return;}
  if(!doBasket.length){notify('Keine Getränke!');return;}
  var total=doBasket.reduce(function(s,o){return s+o.price*o.qty;},0);
  try{
    // FIX: bar_status + kitchen_status, no menu_item_id
    var od=await sbPost('orders',{table_number:tableNum,note:'Bar-Direktbestellung',status:'new',bar_status:'new',kitchen_status:'served',total_k:total});
    var orderId=od[0].id;
    var items=doBasket.map(function(o){return {order_id:orderId,name:o.name,price_k:o.price,quantity:o.qty,category:o.cat};});
    await sbPost('order_items',items);
    notify('✓ '+tWord()+tableNum+' · Rp '+total+'k');
    doBasket=[];renderDoBasket();loadOrders();
  }catch(e){notify('⚠ Fehler: '+e.message);}
}
