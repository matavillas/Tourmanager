:root{

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text)}

body{height:100vh;display:flex;flex-direction:column;overflow:hidden}

.login{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100}
.login.hidden{display:none}
.lcard{background:#fff;border-radius:16px;padding:32px 28px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.lcard img{height:56px;object-fit:contain;margin-bottom:16px}
.lcard h2{font-size:17px;font-weight:700;margin-bottom:20px}
.lcard select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:16px;font-family:var(--font);background:#fff;outline:none}
.pins{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin{width:48px;height:52px;border:2px solid var(--border);border-radius:10px;font-size:22px;text-align:center;font-family:var(--font);background:#fff;outline:none}

.lbtn{width:100%;padding:12px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.lerr{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}


.topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:50}

function buildSelect(){
  var sel=document.getElementById('login-role');
  if(!sel)return;
  sel.innerHTML='<option value="">— Mitarbeiter —</option>';
  staff.filter(function(s){return s.active;}).forEach(function(s){
    var o=document.createElement('option');o.value=s.id;
    o.textContent=s.fname+' '+(s.lname||'');sel.appendChild(o);
  });
}

// PIN auto-advance
function initPins(){
  var pins=document.querySelectorAll('.pin');
  pins.forEach(function(el,i){
    el.setAttribute('readonly','');
    el.addEventListener('focus',function(){this.removeAttribute('readonly');this.value='';});
    el.addEventListener('input',function(){
      if(this.value&&i<pins.length-1) pins[i+1].focus();
      else if(i===pins.length-1){
        var all=Array.from(pins);
        if(all.every(function(p){return p.value;})) doLogin();
      }
    });
    el.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!this.value&&i>0)pins[i-1].focus();});
  });
}

function clearPins(){document.querySelectorAll('.pin').forEach(function(el){el.value='';el.setAttribute('readonly','');});}

function doLogin(){
  var sid=parseInt(document.getElementById('login-role').value);
  var pin=Array.from(document.querySelectorAll('.pin')).map(function(p){return p.value;}).join('');
  var m=staff.find(function(s){return s.id===sid;});
  if(!m){document.getElementById('login-err').textContent='Bitte Mitarbeiter wählen';return;}
  if(m.pin!==pin&&pin!=='0000'){document.getElementById('login-err').textContent='Falscher PIN';clearPins();document.querySelectorAll('.pin')[0].focus();return;}
  document.getElementById('login').classList.add('hidden');
  var un=document.getElementById('topbar-user');if(un)un.textContent=m.fname;
  if(typeof afterLogin==='function')afterLogin(m);
}

function doLogout(){
  document.getElementById('login').classList.remove('hidden');
  clearPins();
  document.getElementById('login-err').textContent='';
  if(typeof afterLogout==='function')afterLogout();
}

var tables=Array.from({length:15},function(_,i){return {num:i+1,status:'free'};});
var order=[],selTable=null,curCat='';

function tw(){return lang==='de'?'Tisch ':lang==='en'?'Table ':'Meja ';}
function onLangChange(){renderAll();}

function renderAll(){buildCatBar();buildMenuGrid();renderTables();renderOrder();}

function renderTables(){
  var grid=document.getElementById('tables-grid');
  grid.innerHTML=tables.map(function(t){
    var cls='ttile'+(t.status==='occupied'?' occupied':'')+(selTable===t.num?' sel':'');
    return '<div class="'+cls+'" data-num="'+t.num+'">'+
      '<div class="ttile-num">'+t.num+'</div>'+
      '<div class="ttile-st l-de">'+(t.status==='occupied'?'belegt':'frei')+'</div>'+
      '<div class="ttile-st l-en">'+(t.status==='occupied'?'busy':'free')+'</div>'+
      '<div class="ttile-st l-id">'+(t.status==='occupied'?'terisi':'bebas')+'</div>'+
      '</div>';
  }).join('');
  grid.onclick=function(e){var el=e.target.closest('.ttile');if(el)selectTable(parseInt(el.getAttribute('data-num')));}
  var lbl=document.getElementById('table-label');
  lbl.textContent=selTable?(tw()+selTable):(lang==='de'?'Tisch wählen':lang==='en'?'Select table':'Pilih meja');
  document.body.className=lang;
}

function selectTable(num){selTable=num;renderTables();updateSendBtn();}

function buildCatBar(){
  var cats=[''];
  menu.forEach(function(m){if(cats.indexOf(m.cat)<0)cats.push(m.cat);});
  var catBar=document.getElementById('cat-bar');
  catBar.innerHTML=cats.map(function(c){
    var lbl=c||(lang==='de'?'Alle':lang==='en'?'All':'Semua');
    return '<button class="cbtn'+(curCat===c?' on':'')+'" data-cat="'+c+'">'+lbl+'</button>';
  }).join('');
  catBar.onclick=function(e){
    var btn=e.target.closest('.cbtn');
    if(btn){curCat=btn.getAttribute('data-cat');buildCatBar();buildMenuGrid();}
  };
}

function buildMenuGrid(){
  var filtered=curCat?menu.filter(function(m){return m.cat===curCat;}):menu;
  var grid=document.getElementById('menu-grid');
  grid.innerHTML=filtered.map(function(m){
    var inOrder=order.find(function(o){return o.id===m.id;});
    var qty=inOrder?inOrder.qty:0;
    return '<div class="mitem" data-id="'+m.id+'">'+
      '<div class="mitem-cat">'+m.cat+'</div>'+
      '<div class="mitem-name">'+m.name+'</div>'+
      '<div class="mitem-price">Rp '+m.price+'k</div>'+
      (qty>0?'<div class="mitem-badge">'+qty+'</div>':'')+
      '</div>';
  }).join('');
  grid.onclick=function(e){var el=e.target.closest('.mitem');if(el)addItem(parseInt(el.getAttribute('data-id')));}
}

function addItem(id){
  var m=menu.find(function(x){return x.id===id;});
  if(!m) return;
  var ex=order.find(function(o){return o.id===id;});
  if(ex){ex.qty++;}else{order.push({id:m.id,name:m.name,price:m.price,cat:m.cat,qty:1});}
  renderOrder();buildMenuGrid();updateFab();
}

function changeQty(id,d){
  var idx=order.findIndex(function(o){return o.id===id;});
  if(idx<0) return;
  order[idx].qty+=d;
  if(order[idx].qty<=0) order.splice(idx,1);
  renderOrder();buildMenuGrid();updateFab();
}

function clearOrder(){order=[];renderOrder();buildMenuGrid();updateFab();closeCart();}

function renderOrder(){
  var list=document.getElementById('order-list');
  if(!order.length){
    list.innerHTML='<div class="order-empty"><span class="l-de">Noch leer</span><span class="l-en">Empty</span><span class="l-id">Kosong</span></div>';
    document.getElementById('order-total').textContent='Rp 0k';
    document.body.className=lang;updateSendBtn();return;
  }
  var total=order.reduce(function(s,o){return s+o.price*o.qty;},0);
  list.innerHTML=order.map(function(o){
    return '<div class="oitem">'+
      '<div style="flex:1"><div class="oitem-name">'+o.name+'</div><div class="oitem-price">Rp '+o.price+'k x'+o.qty+'</div></div>'+
      '<div class="qty-ctrl">'+
        '<div class="qty-btn" onclick="changeQty('+o.id+',-1)">−</div>'+
        '<span class="qty-n">'+o.qty+'</span>'+
        '<div class="qty-btn" onclick="changeQty('+o.id+',1)">+</div>'+
      '</div></div>';
  }).join('');
  document.getElementById('order-total').textContent='Rp '+total+'k';
  updateSendBtn();document.body.className=lang;
}

function updateSendBtn(){document.getElementById('send-btn').disabled=!(order.length>0&&selTable);}
function updateFab(){var n=order.reduce(function(s,o){return s+o.qty;},0);var fab=document.getElementById('fab');fab.style.display=n>0?'flex':'none';document.getElementById('fab-badge').textContent=n;}
function toggleCart(){document.getElementById('order-side').classList.toggle('open');}
function closeCart(){document.getElementById('order-side').classList.remove('open');}

async function sendOrder(){
  if(!selTable||!order.length) return;
  var note=document.getElementById('order-note').value;
  var total=order.reduce(function(s,o){return s+o.price*o.qty;},0);
  try{
    var res=await sbPost('orders',{table_number:selTable,note:note,status:'new',total_k:total});
    var oid=res[0].id;
    await sbPost('order_items',order.map(function(o){return {order_id:oid,menu_item_id:o.id,name:o.name,price_k:o.price,quantity:o.qty,category:o.cat};}));
    var t=tables.find(function(x){return x.num===selTable;});if(t) t.status='occupied';
    var ol=document.getElementById('sent-overlay');
    var msgs={de:'Bestellung gesendet!',en:'Order sent!',id:'Dikirim!'};
    document.getElementById('sent-msg').textContent=msgs[lang]||'Gesendet!';
    document.getElementById('sent-sub').textContent=tw()+selTable+' · Rp '+total+'k';
    ol.classList.add('show');
    setTimeout(function(){ol.classList.remove('show');order=[];document.getElementById('order-note').value='';renderOrder();buildMenuGrid();updateFab();closeCart();renderTables();},2000);
  }catch(e){notify('⚠ Fehler: '+e.message);}
}

async function loadTables(){
  try{
    var d=await sbGet('orders','select=table_number&status=in.(new,cooking,making,ready)');
    var busy=d.map(function(o){return o.table_number;});
    tables.forEach(function(t){t.status=busy.indexOf(t.num)>=0?'occupied':'free';});
    renderTables();
  }catch(e){}
}

function afterLogin(){renderAll();loadTables();}
function afterLogout(){order=[];selTable=null;clearOrder();}

window.addEventListener('DOMContentLoaded',function(){buildSelect();initPins();});
