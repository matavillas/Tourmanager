.rl{display:flex;align-items:center;cursor:pointer}
.rbar{width:5px;min-height:56px;align-self:stretch;flex-shrink:0}
.rnames{flex:1;padding:13px 12px}
.rn1{font-size:15px;font-weight:700;line-height:1.3}
.rn2{font-size:12px;color:#aaa;margin-top:2px}
.arr{padding:14px 14px 14px 0;font-size:13px;color:#bbb;flex-shrink:0;transition:transform .2s}
.rd{display:none;padding:14px;border-top:1px solid #eee;background:#faf9f6}
.rck{display:none}
.rck:checked~.rd{display:block}
.rck:checked~.rl .arr{transform:rotate(90deg)}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.rh{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.it{width:100%;border-collapse:collapse}
.it tr{border-bottom:1px solid #f0ede8}
.it tr:last-child{border-bottom:none}
.it td{padding:6px 2px;font-size:13px;line-height:1.4}
.am{text-align:right;color:#1a7fa8;font-weight:700;font-family:monospace;font-size:12px;width:80px;padding-left:6px}
.sp{display:flex;gap:8px;margin-bottom:8px}
.sn{width:20px;height:20px;border-radius:50%;background:#e8f4f9;color:#1a7fa8;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.st{font-size:13px;color:#555;line-height:1.55;flex:1}
.note{margin-top:10px;font-size:12px;color:#999;font-style:italic;padding-top:8px;border-top:1px solid #eee}
.edbtn{margin-top:10px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid #1a7fa8;background:#e8f4f9;color:#1a7fa8;cursor:pointer;font-family:inherit}
.editform{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #eee}
.editform.open{display:block}
.editform label{font-size:11px;color:#aaa;display:block;margin-bottom:3px;margin-top:10px;font-weight:700;text-transform:uppercase}
.editform input,.editform textarea,.editform select{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;outline:none}
.editform textarea{resize:vertical}
.savebtn{margin-top:10px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;border:none;background:#1a7fa8;color:#fff;cursor:pointer;font-family:inherit}
.cancelbtn{margin-top:10px;margin-left:8px;padding:8px 14px;border-radius:8px;font-size:13px;border:1px solid #ccc;background:#f5f2ed;color:#666;cursor:pointer;font-family:inherit}
.translating{color:#1a7fa8;font-size:12px;margin-top:6px;font-style:italic}
.notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1815;color:#fff;border-radius:8px;padding:10px 18px;font-size:13px;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.lb').forEach(function(b,i){if(['de','en','id'][i]===l)b.classList.add('on');});
  renderCatBar();
  renderRecipes();
}

function renderCatBar(){
  var bar=document.getElementById('catbar');
  bar.innerHTML=cats[lang].map(function(c){
    return '<span class="cb'+(curCat===c[0]?' on':'')+'" onclick="filterCat(\''+c[0]+'\')">'+c[1]+'</span>';
  }).join('');
}

function filterCat(cat){
  curCat=cat;
  renderCatBar();
  renderRecipes();
}

function renderRecipes(){
  var filtered=curCat?R.filter(function(r){return r.cat===curCat;}):R;
  var content=document.getElementById('content');
  content.innerHTML=filtered.map(function(r){
    var col=catCols[r.cat]||'#888';
    var nm=r.n[lang];
    var others=['de','en','id'].filter(function(l2){return l2!==lang;}).map(function(l2){return r.n[l2];}).join(' / ');
    var ings=r.i[lang].map(function(x){
      return '<tr><td>'+x[0]+'</td><td class="am">'+x[1]+'</td></tr>';
    }).join('');
    var steps=r.s[lang].map(function(s,i){
      return '<div class="sp"><div class="sn">'+(i+1)+'</div><div class="st">'+s+'</div></div>';
    }).join('');
    var note=r.note?'<div class="note">'+r.note+'</div>':'';
    return '<div class="rc" id="rc-'+r.id+'">'
      +'<input type="checkbox" class="rck" id="ck-'+r.id+'">'
      +'<label class="rl" for="ck-'+r.id+'">'
      +'<div class="rbar" style="background:'+col+'"></div>'
      +'<div class="rnames"><div class="rn1">'+nm+'</div><div class="rn2">'+others+'</div></div>'
      +'<div class="arr">▶</div></label>'
      +'<div class="rd"><div class="rg">'
      +'<div><div class="rh">'+head[lang].i+'</div><table class="it">'+ings+'</table></div>'
      +'<div><div class="rh">'+head[lang].s+'</div>'+steps+'</div>'
      +'</div>'+note
      +'<button class="edbtn" onclick="editRecipe('+r.id+',event)">✏️ Bearbeiten</button>'
      +'<div class="editform" id="ef-'+r.id+'"></div>'
      +'</div></div>';
  }).join('');
}


function parseIngs(txt){
  return txt.split('\n').filter(function(l){return l.trim();}).map(function(l){
    var p=l.split('|');return [(p[0]||'').trim(),(p[1]||'').trim()];
  });
}


function closeEdit(id){
  var ef=document.getElementById('ef-'+id);
  if(ef) ef.classList.remove('open');
}

function editRecipe(id, e){
  e.stopPropagation();
  var r=R.find(function(x){return x.id===id;});
  var ef=document.getElementById('ef-'+id);
  if(ef.classList.contains('open')){ef.classList.remove('open');return;}
  ef.innerHTML=''
    +'<label>Name (DE)</label><input id="en-de-'+id+'" value="'+r.n.de+'">'
    +'<label>Name (EN)</label><input id="en-en-'+id+'" value="'+r.n.en+'">'
    +'<label>Name (ID)</label><input id="en-id-'+id+'" value="'+r.n.id+'">'
    +'<label>Zutaten DE (Name|Menge, je Zeile)</label>'
    +'<textarea id="ei-de-'+id+'" rows="6">'+r.i.de.map(function(x){return x[0]+'|'+x[1];}).join('\n')+'</textarea>'
    +'<label>Zutaten EN</label>'
    +'<textarea id="ei-en-'+id+'" rows="6">'+r.i.en.map(function(x){return x[0]+'|'+x[1];}).join('\n')+'</textarea>'
    +'<label>Zutaten ID</label>'
    +'<textarea id="ei-id-'+id+'" rows="6">'+r.i.id.map(function(x){return x[0]+'|'+x[1];}).join('\n')+'</textarea>'
    +'<label>Zubereitung DE (je Schritt eine Zeile)</label>'
    +'<textarea id="es-de-'+id+'" rows="5">'+r.s.de.join('\n')+'</textarea>'
    +'<label>Zubereitung EN</label>'
    +'<textarea id="es-en-'+id+'" rows="5">'+r.s.en.join('\n')+'</textarea>'
    +'<label>Zubereitung ID</label>'
    +'<textarea id="es-id-'+id+'" rows="5">'+r.s.id.join('\n')+'</textarea>'
    +'<label>Notiz</label><input id="enote-'+id+'" value="'+(r.note||'')+'">'
    +'<div id="trans-status-'+id+'" class="translating"></div>'
    +'<button class="savebtn" onclick="saveEdit('+id+')">Speichern</button>'
    +'<button class="cancelbtn" onclick="closeEdit('+id+')" >Abbrechen</button>';
  ef.classList.add('open');
}

function saveEdit(id){
  var r=R.find(function(x){return x.id===id;});
  r.n.de=document.getElementById('en-de-'+id).value;
  r.n.en=document.getElementById('en-en-'+id).value;
  r.n.id=document.getElementById('en-id-'+id).value;
  r.i.de=parseIngs(document.getElementById('ei-de-'+id).value);
  r.i.en=parseIngs(document.getElementById('ei-en-'+id).value);
  r.i.id=parseIngs(document.getElementById('ei-id-'+id).value);
  r.s.de=document.getElementById('es-de-'+id).value.split('\n').filter(function(l){return l.trim();});
  r.s.en=document.getElementById('es-en-'+id).value.split('\n').filter(function(l){return l.trim();});
  r.s.id=document.getElementById('es-id-'+id).value.split('\n').filter(function(l){return l.trim();});
  r.note=document.getElementById('enote-'+id).value;
  saveToSupabase(r).catch(function(e){console.warn('Save failed:',e);});
  document.getElementById('ef-'+id).classList.remove('open');
  renderRecipes();
  var n=document.getElementById('notif');
  n.textContent='✓ Gespeichert';n.classList.add('sh');
  setTimeout(function(){n.classList.remove('sh');},2000);
}

function sbRowToR(row){
  return {
    id:row.id, cat:row.category,
    n:{de:row.name_de||'',en:row.name_en||'',id:row.name_id||''},
    i:{de:row.ingredients_de||[],en:row.ingredients_en||[],id:row.ingredients_id||[]},
    s:{de:row.steps_de||[],en:row.steps_en||[],id:row.steps_id||[]},
    note:row.note||''
  };
}

async function loadFromSupabase(){
  try{
    var resp=await fetch(SB_URL+'/rest/v1/recipes?order=id',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    if(!resp.ok) throw new Error(resp.status);
    var data=await resp.json();
    if(data&&data.length>0){
      R=data.map(sbRowToR);
      renderCatBar();
      renderRecipes();
    }
  }catch(e){console.warn('Supabase offline, using local data');}
}

async function saveToSupabase(r){
  return fetch(SB_URL+'/rest/v1/recipes?id=eq.'+r.id,{
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({
      name_de:r.n.de,name_en:r.n.en,name_id:r.n.id,
      category:r.cat,
      ingredients_de:r.i.de,ingredients_en:r.i.en,ingredients_id:r.i.id,
      steps_de:r.s.de,steps_en:r.s.en,steps_id:r.s.id,
      note:r.note,updated_at:new Date().toISOString()
    })
  });
}

window.addEventListener('DOMContentLoaded',function(){
  renderCatBar();
  renderRecipes();
  loadFromSupabase();
});
</script>
