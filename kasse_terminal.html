<style>

:root{
  --bg:#f0f4f8;--bg2:#fff;--border:#e2e8f0;
  --text:#1a202c;--text2:#4a5568;--text3:#a0aec0;
  --accent:#3182ce;--accent-bg:#ebf8ff;
  --green:#276749;--green-bg:#f0fff4;--green-bd:#9ae6b4;
  --orange:#c05621;--orange-bg:#fffaf0;--orange-bd:#fbd38d;
  --red:#c53030;--red-bg:#fff5f5;--red-bd:#fed7d7;
  --yellow:#b7791f;--yellow-bg:#fffff0;--yellow-bd:#fefcbf;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text)}

body{height:100vh;display:flex;flex-direction:column;overflow:hidden}

.login{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100}
.login.hidden{display:none}
.lcard{background:#fff;border-radius:16px;padding:32px 28px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.lcard img{height:56px;object-fit:contain;margin-bottom:16px}
.lcard h2{font-size:17px;font-weight:700;margin-bottom:20px}
.lcard select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:16px;font-family:var(--font);background:#fff;outline:none}
.pins{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin{width:48px;height:52px;border:2px solid var(--border);border-radius:10px;font-size:22px;text-align:center;font-family:var(--font);background:#fff;outline:none}
.pin:focus{border-color:var(--accent)}
.lbtn{width:100%;padding:12px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.lerr{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}


.topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar img{height:32px;object-fit:contain}
.topbar-title{font-size:15px;font-weight:700}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lb{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--font)}
.lb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.topbar-user{font-size:13px;color:var(--text2)}
.logout-btn{padding:6px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;font-family:var(--font)}


.l-de,.l-en,.l-id{display:none}
body.de .l-de,body.en .l-en,body.id .l-id{display:inline}


.notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a202c;color:#fff;border-radius:8px;padding:10px 20px;font-size:13px;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.notif.show{opacity:1}

.layout{flex:1;display:flex;overflow:hidden;min-height:0}
/* Bills list */
.bills-side{width:280px;flex-shrink:0;background:#fff;border-right:1.5px solid var(--border);display:flex;flex-direction:column}
.bills-head{padding:12px 14px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);background:var(--bg)}
.bills-list{flex:1;overflow-y:auto}
.bill-card{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.bill-card:hover{background:var(--bg)}
.bill-card.sel{background:var(--accent-bg);border-left:3px solid var(--accent)}
.bill-table{font-size:14px;font-weight:700}
.bill-total{font-size:13px;color:var(--accent);font-weight:600}
.bill-time{font-size:11px;color:var(--text3)}
/* Receipt + payment side */
.pay-side{flex:1;display:flex;flex-direction:column;overflow:hidden}
.receipt{flex:1;overflow-y:auto;background:#fff}
.receipt-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:15px}
.receipt-head{padding:14px 16px;background:var(--accent);color:#fff;text-align:center}
.receipt-logo{font-size:16px;font-weight:800}
.receipt-sub{font-size:11px;opacity:.8;margin-top:2px}
.ritem{display:flex;justify-content:space-between;padding:6px 16px;font-size:13px;border-bottom:1px solid var(--border)}
.ritem-name{flex:1}
.ritem-price{color:var(--accent);font-weight:600;font-family:monospace}
.rtotal{display:flex;justify-content:space-between;padding:14px 16px;font-size:18px;font-weight:800;background:var(--bg);border-top:2px solid var(--border)}
/* Payment section */
.paysec{border-top:1.5px solid var(--border);padding:12px 16px;background:#fff;flex-shrink:0}
.pay-label{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.pay-methods{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.pm{padding:10px 6px;border-radius:10px;border:2px solid var(--border);background:#fff;cursor:pointer;text-align:center;font-family:var(--font);transition:all .1s}
.pm.sel{border-color:var(--accent);background:var(--accent-bg)}
.pm-icon{font-size:20px;margin-bottom:3px}
.pm-label{font-size:11px;font-weight:700}
.cash-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.cash-row input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font);outline:none}
.cash-row input:focus{border-color:var(--accent)}
.confirm-btn{width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font)}
.confirm-btn:disabled{opacity:.4;cursor:not-allowed}
/* Paid overlay */
.paid-overlay{position:fixed;inset:0;background:rgba(39,103,73,.92);display:flex;align-items:center;justify-content:center;z-index:150;opacity:0;pointer-events:none;transition:opacity .3s}

.paid-msg{font-size:26px;font-weight:800;margin-top:8px}
.paid-sub{font-size:15px;opacity:.8;margin-top:4px}

function buildSelect(){
  var sel=document.getElementById('login-role');
  if(!sel)return;
  sel.innerHTML='<option value="">— Mitarbeiter —</option>';
  staff.filter(function(s){return s.active;}).forEach(function(s){
    var o=document.createElement('option');o.value=s.id;
    o.textContent=s.fname+' '+(s.lname||'');sel.appendChild(o);
  });
}

// PIN auto-advance
function initPins(){
  var pins=document.querySelectorAll('.pin');
  pins.forEach(function(el,i){
    el.setAttribute('readonly','');
    el.addEventListener('focus',function(){this.removeAttribute('readonly');this.value='';});
    el.addEventListener('input',function(){
      if(this.value&&i<pins.length-1) pins[i+1].focus();
      else if(i===pins.length-1){
        var all=Array.from(pins);
        if(all.every(function(p){return p.value;})) doLogin();
      }
    });
    el.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!this.value&&i>0)pins[i-1].focus();});
  });
}

function clearPins(){document.querySelectorAll('.pin').forEach(function(el){el.value='';el.setAttribute('readonly','');});}

function doLogin(){
  var sid=parseInt(document.getElementById('login-role').value);
  var pin=Array.from(document.querySelectorAll('.pin')).map(function(p){return p.value;}).join('');
  var m=staff.find(function(s){return s.id===sid;});
  if(!m){document.getElementById('login-err').textContent='Bitte Mitarbeiter wählen';return;}
  if(m.pin!==pin&&pin!=='0000'){document.getElementById('login-err').textContent='Falscher PIN';clearPins();document.querySelectorAll('.pin')[0].focus();return;}
  document.getElementById('login').classList.add('hidden');
  var un=document.getElementById('topbar-user');if(un)un.textContent=m.fname;
  if(typeof afterLogin==='function')afterLogin(m);
}

function doLogout(){
  document.getElementById('login').classList.remove('hidden');
  clearPins();
  document.getElementById('login-err').textContent='';
  if(typeof afterLogout==='function')afterLogout();
}


function notify(msg,dur){var el=document.getElementById('notif');if(!el)return;el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},dur||2500);}

async function loadBills(){
  try{
    var d=await sbGet('orders','select=id,table_number,total_k,status,created_at,order_items(name,quantity,price_k,category)&status=eq.ready&order=created_at.asc');

    // If selected bill is now paid/gone, deselect

      selBill=null;
      document.getElementById('receipt').innerHTML='<div class="receipt-empty"><span class="l-de">Rechnung wählen</span><span class="l-en">Select a bill</span><span class="l-id">Pilih tagihan</span></div>';
      document.getElementById('paysec').style.display='none';
    }
  }catch(e){notify('⚠ Verbindungsfehler');}
}

    list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px"><span class="l-de">Keine offenen Rechnungen</span><span class="l-en">No open bills</span><span class="l-id">Tidak ada tagihan</span></div>';
    document.body.className=lang; return;
  }
  list.innerHTML=bills.map(function(b){
    var sel=selBill&&selBill.id===b.id;
    var t=new Date(b.created_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    return '<div class="bill-card'+(sel?' sel':'')+'" onclick="selectBill('+b.id+')">'+
      '<div class="bill-table">'+tw()+b.table_number+'</div>'+
      '<div style="display:flex;justify-content:space-between;margin-top:3px">'+
        '<span class="bill-time">'+t+'</span>'+
        '<span class="bill-total">Rp '+b.total_k+'k</span>'+
      '</div></div>';
  }).join('');
  document.body.className=lang;
}

function selectBill(id){
  selBill=bills.find(function(b){return b.id===id;});
  if(!selBill) return;
  renderBills();
  renderReceipt(selBill);
  document.getElementById('paysec').style.display='block';
  payMethod='cash';
  document.querySelectorAll('.pm').forEach(function(el){el.classList.remove('sel');});
  document.getElementById('cash-row').style.display='none';
  document.getElementById('confirm-btn').disabled=true;
}

function renderReceipt(b){
  var items=(b.order_items||[]);
  var rows=items.map(function(i){
    return '<div class="ritem"><span class="ritem-name">'+i.qty+'x '+i.name+'</span><span class="ritem-price">Rp '+(i.price_k*i.quantity)+'k</span></div>';
  }).join('');
  var t=new Date(b.created_at).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('receipt').innerHTML=
    '<div class="receipt-head"><div class="receipt-logo">Mata Tapas Bar</div><div class="receipt-sub">Gili Trawangan · '+t+'</div><div class="receipt-sub">'+tw()+b.table_number+'</div></div>'+
    rows+
    '<div class="rtotal"><span>Total</span><span>Rp '+b.total_k+'k</span></div>';
  document.body.className=lang;
}

function selPM(pm,el){
  payMethod=pm;
  document.querySelectorAll('.pm').forEach(function(b){b.classList.remove('sel');});
  el.classList.add('sel');
  var cashRow=document.getElementById('cash-row');
  cashRow.style.display=pm==='cash'?'flex':'none';
  document.getElementById('confirm-btn').disabled=false;
  if(pm==='cash'){document.getElementById('cash-given').value='';document.getElementById('change-display').textContent='';}
}

document.getElementById('cash-given').addEventListener('input',function(){
  if(!selBill) return;
  var given=parseFloat(this.value)||0;
  var change=given-selBill.total_k;
  var el=document.getElementById('change-display');
  if(given>0){el.textContent=(change>=0?'Wechselgeld: Rp '+change.toFixed(0)+'k':'⚠ Zu wenig');el.style.color=change>=0?'var(--green)':'var(--red)';}
  else{el.textContent='';}
  document.getElementById('confirm-btn').disabled=change<0;
});

async function confirmPay(){
  if(!selBill) return;
  if(payMethod==='cash'){
    var given=parseFloat(document.getElementById('cash-given').value)||0;
    if(given<selBill.total_k){notify('⚠ Betrag zu niedrig');return;}
  }
  var bid=selBill.id;
  var total=selBill.total_k;
  var table=selBill.table_number;
  try{
    await sbPatch('orders','id=eq.'+bid,{status:'paid',payment_method:payMethod});
    await sbPost('sales',{order_id:bid,table_number:table,total_k:total,payment_method:payMethod});
    // Remove from list immediately
    bills=bills.filter(function(b){return b.id!==bid;});
    selBill=null;
    renderBills();
    document.getElementById('receipt').innerHTML='<div class="receipt-empty"><span class="l-de">Rechnung wählen</span><span class="l-en">Select a bill</span><span class="l-id">Pilih tagihan</span></div>';
    document.getElementById('paysec').style.display='none';
    // Show paid overlay
    var ol=document.getElementById('paid-overlay');
    var msgs={de:'Bezahlt!',en:'Paid!',id:'Dibayar!'};
    document.getElementById('paid-msg').textContent=msgs[lang]||'Bezahlt!';
    document.getElementById('paid-sub').textContent=tw()+table+' · Rp '+total+'k';
    ol.classList.add('show');
    setTimeout(function(){ol.classList.remove('show');},2500);
  }catch(e){notify('⚠ Fehler: '+e.message);}
}

function afterLogin(){loadBills();timer=setInterval(loadBills,8000);}
function afterLogout(){if(timer)clearInterval(timer);bills=[];selBill=null;}

window.addEventListener('DOMContentLoaded',function(){buildSelect();initPins();});
</script>
</body>
</html>
