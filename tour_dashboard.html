<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tour Dashboard · tour_dashboard</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#f0ede8;font-family:sans-serif;padding-bottom:40px}h1{background:#1a1814;color:#f0ede8;padding:16px 24px;font-size:16px}  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:20px}.card{background:#fff;border:1px solid #d8d3cc;border-radius:10px;overflow:hidden}.ch{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #d8d3cc}.cnt{font-size:11px;background:#f0ede8;padding:2px 8px;border-radius:10px;color:#8a8480}.gm{display:block;margin:10px 12px 0;padding:11px;border-radius:7px;text-decoration:none;font-size:13px;font-weight:700;text-align:center;color:#fff}.cr{display:flex;margin:6px 12px 10px}.ci{flex:1;background:#f0ede8;border:1px solid #d8d3cc;border-right:none;padding:6px 8px;font-size:10px;border-radius:6px 0 0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;outline:none;font-family:monospace}.cb{background:#d8d3cc;border:1px solid #d8d3cc;padding:6px 10px;border-radius:0 6px 6px 0;cursor:pointer;font-size:11px;font-weight:600}.cb.done{background:#1a9c4a;color:#fff;border-color:#1a9c4a}.depot{padding:6px 12px;background:rgba(200,67,26,0.06);font-size:11px;font-weight:600;color:#c8431a;border-bottom:1px solid rgba(216,211,204,0.4);font-family:monospace}.stop{display:flex;align-items:flex-start;gap:8px;padding:7px 12px;border-bottom:1px solid rgba(216,211,204,0.4)}.n{font-size:11px;color:#8a8480;min-width:20px;font-family:monospace;padding-top:1px}.sn{font-size:12px;font-weight:600}.sa{font-size:11px;color:#8a8480;font-family:monospace;margin-top:1px}.note{font-size:10px;color:#c8961a;background:rgba(200,150,26,0.1);padding:1px 6px;border-radius:3px;margin-top:2px;display:inline-block}</style></head><body><h1 style="display:flex;align-items:center;gap:16px;">Tour Dashboard <span style="background:#c8431a;color:#fff;padding:2px 10px;border-radius:4px;font-size:14px;">tour_dashboard</span></h1><div class="grid"></div><script>document.querySelectorAll('.cb').forEach(b=>{b.addEventListener('click',()=>{navigator.clipboard.writeText(b.dataset.url).then(()=>{b.textContent='✓ Kopiert!';b.classList.add('done');setTimeout(()=>{b.textContent='Kopieren';b.classList.remove('done');},2500);});});});</script></body></html>
